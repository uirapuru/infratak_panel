monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - worker_provisioning
        - worker_projection

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!worker_provisioning", "!worker_projection"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console", "!worker_provisioning", "!worker_projection"]
            worker_provisioning:
                type: rotating_file
                path: /var/log/infratak/worker_provisioning.log
                level: debug
                channels: [worker_provisioning]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_projection:
                type: rotating_file
                path: /var/log/infratak/worker_projection.log
                level: debug
                channels: [worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_errors:
                type: rotating_file
                path: /var/log/infratak/worker_errors.log
                level: error
                channels: [worker_provisioning, worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!worker_provisioning", "!worker_projection"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            worker_provisioning:
                type: rotating_file
                path: /var/log/infratak/worker_provisioning.log
                level: debug
                channels: [worker_provisioning]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_projection:
                type: rotating_file
                path: /var/log/infratak/worker_projection.log
                level: debug
                channels: [worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_errors:
                type: rotating_file
                path: /var/log/infratak/worker_errors.log
                level: error
                channels: [worker_provisioning, worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation", "!worker_provisioning", "!worker_projection"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!worker_provisioning", "!worker_projection"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            worker_provisioning:
                type: rotating_file
                path: /var/log/infratak/worker_provisioning.log
                level: debug
                channels: [worker_provisioning]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_projection:
                type: rotating_file
                path: /var/log/infratak/worker_projection.log
                level: debug
                channels: [worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'
            worker_errors:
                type: rotating_file
                path: /var/log/infratak/worker_errors.log
                level: error
                channels: [worker_provisioning, worker_projection]
                formatter: monolog.formatter.worker_pretty
                max_files: 12
                filename_format: '{filename}-{date}'
                date_format: 'Y-m'

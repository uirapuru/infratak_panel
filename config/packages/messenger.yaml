framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 5
                    delay: 10000
                    multiplier: 1.5
                    max_delay: 30000

        routing:
            App\Message\CreateServerMessage: async
            App\Message\DeleteServerMessage: async


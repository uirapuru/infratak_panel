# Production compose — dual-role deployment
# Landing: port 8080     → serves public site, blocks /admin
# Admin:   port 8081     → serves /admin only, blocks everything else
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#
# ALB routing:
#   infratak.com       → target group port 8080 (landing)
#   admin.infratak.com → target group port 8081 (admin)

services:

  # ── Landing ────────────────────────────────────────────────────────────────

  landing_php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.deploy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_ROLE: landing
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_EC2_METADATA_DISABLED: "true"
      APP_TIMEZONE: Europe/Warsaw
      TZ: Europe/Warsaw
    volumes:
      - ./:/app:ro
      - landing_php_cache:/app/var/cache
      - ./var/share/.aws:/root/.aws:ro
      - ./var/log:/var/log/infratak
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  landing_nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - landing_php
    volumes:
      - ./:/app:ro
      - ./docker/nginx/conf.d/landing.conf:/etc/nginx/conf.d/default.conf:ro
      - ./var/letsencrypt:/etc/letsencrypt:ro
      - ./var/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Admin ───────────────────────────────────────────────────────────────────

  admin_php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env.deploy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_ROLE: admin
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_EC2_METADATA_DISABLED: "true"
      APP_TIMEZONE: Europe/Warsaw
      TZ: Europe/Warsaw
    volumes:
      - ./:/app:ro
      - admin_php_cache:/app/var/cache
      - ./var/share/.aws:/root/.aws:ro
      - ./var/log:/var/log/infratak
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  admin_nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - admin_php
    volumes:
      - ./:/app:ro
      - ./docker/nginx/conf.d/admin.conf:/etc/nginx/conf.d/default.conf:ro
      # Rate-limit zone — must be included at http context, separate from server block
      - ./docker/nginx/conf.d/rate_limit.conf:/etc/nginx/conf.d/rate_limit.conf:ro
      # Basic-auth credentials — generate with:
      #   htpasswd -nbB admin '<password>' > docker/nginx/.htpasswd
      # File is gitignored; must be present on the host before starting.
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Shared workers ─────────────────────────────────────────────────────────

  worker_provisioning:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: php bin/console messenger:consume provisioning --time-limit=3600 --memory-limit=256M
    env_file:
      - .env.deploy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_EC2_METADATA_DISABLED: "true"
      APP_TIMEZONE: Europe/Warsaw
      TZ: Europe/Warsaw
    volumes:
      - ./:/app:ro
      - worker_provisioning_cache:/app/var/cache
      - ./var/share/.aws:/root/.aws:ro
      - ./var/log:/var/log/infratak
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_projection:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: php bin/console messenger:consume projection --time-limit=3600 --memory-limit=256M
    env_file:
      - .env.deploy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_EC2_METADATA_DISABLED: "true"
      APP_TIMEZONE: Europe/Warsaw
      TZ: Europe/Warsaw
    volumes:
      - ./:/app:ro
      - worker_projection_cache:/app/var/cache
      - ./var/share/.aws:/root/.aws:ro
      - ./var/log:/var/log/infratak
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "while true; do php bin/console app:servers:sync-status; php bin/console app:subscriptions:enforce; sleep 300; done"
    env_file:
      - .env.deploy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_EC2_METADATA_DISABLED: "true"
      APP_TIMEZONE: Europe/Warsaw
      TZ: Europe/Warsaw
    volumes:
      - ./:/app:ro
      - scheduler_cache:/app/var/cache
      - ./var/share/.aws:/root/.aws:ro
      - ./var/log:/var/log/infratak
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD required}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD required}
      TZ: Europe/Warsaw
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mariadb_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS required}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mariadb_data:
  rabbitmq_data:
  landing_php_cache:
  admin_php_cache:
  worker_provisioning_cache:
  worker_projection_cache:
  scheduler_cache:

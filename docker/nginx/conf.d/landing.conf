server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    root /app/public;
    index index.php;

    # ALB / container healthcheck — must be explicit so it survives any future
    # reordering of location blocks and is never accidentally blocked
    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    # ACME challenge for certbot webroot flow
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    root /app/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/infratak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infratak.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Route /admin to dedicated admin nginx service.
    # Variable-based proxy_pass forces lazy DNS resolution via the resolver directive,
    # so landing_nginx can start even when admin_nginx is not yet up.
    location ^~ /admin {
        set $admin_upstream http://admin_nginx:80;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $php_upstream landing_php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}

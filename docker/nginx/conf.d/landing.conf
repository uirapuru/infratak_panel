server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    root /app/public;
    index index.php;

    # ALB / container healthcheck — must be explicit so it survives any future
    # reordering of location blocks and is never accidentally blocked
    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    # === LANDING ROLE: block all /admin paths at nginx level ===
    location ^~ /admin {
        return 403;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $php_upstream landing_php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    root /app/public;
    index index.php;

    # === ADMIN ROLE: only /admin paths allowed ===

    # Allow static assets required by EasyAdmin (/bundles/easyadmin/, etc.)
    location ^~ /bundles/ {
        try_files $uri =404;
    }

    # Allow ALB / container healthcheck — no auth, no rate limit
    # ALB sends unauthenticated GET /health; must return 2xx
    location = /health {
        try_files $uri /index.php$is_args$args;
    }

    # Allow all /admin routes — rate-limited + HTTP Basic Auth
    # Generate .htpasswd:  htpasswd -nbB admin '<password>' > docker/nginx/.htpasswd
    location ^~ /admin {
        auth_basic "Infratak Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;

        limit_req zone=admin_zone burst=10 nodelay;

        try_files $uri /index.php$is_args$args;
    }

    # Block everything else
    location / {
        return 403;
    }

    location ~ ^/index\.php(/|$) {
        set $php_upstream admin_php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}

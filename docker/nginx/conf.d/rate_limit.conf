# Rate-limiting zone for the admin panel.
# Defined at http context (this file is included by the default nginx.conf
# inside its http {} block).  Mounted only for admin_nginx in compose.prod.yml.
#
# 20 req/min per IP — comfortable for a human operator, blocks brute-force.
limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=20r/m;
limit_req_status 429;
